services:
  - type: web
    name: ai-legislation-tracker
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir webapp --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: PYTHON_VERSION
        value: 3.11.9
